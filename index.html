                if (!q) { searchResults.classList.remove('has-results'); return; }
                const all = getAllClasses();
                const hits = all.filter(c =>
                    c.name.toLowerCase().includes(q) ||

                );

                    `;

            $('#btnSearchClose').addEventListener('click', toggleSearch);
            document.addEventListener('keydown', e => {

                if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault();
                    toggleSearch(); }

            // ==================== 通知提醒 ====================
            let notifyEnabled = false;
            let notifiedClasses = new Set();
            let notifyInterval = null;

            function requestNotification() {
                if (!('Notification' in window)) { showToast('⚠️ 你的浏览器不支持通知'); return; }
                if (Notification.permission === 'granted') {
                    notifyEnabled = true;
                    notifyBadge.classList.add('on');
                    startNotifyCheck();
                    showToast('🔔 课程提醒已开启');
                    return;
                }
                Notification.requestPermission().then(p => {
                    if (p === 'granted') {
                        notifyEnabled = true;
                        notifyBadge.classList.add('on');
                        startNotifyCheck();
                        showToast('🔔 课程提醒已开启');
                    } else {
                        showToast('⚠️ 通知权限被拒绝');
                    }
                });
            }

            function startNotifyCheck() {
                if (notifyInterval) clearInterval(notifyInterval);
                notifyInterval = setInterval(checkUpcomingClasses, 30000);
                checkUpcomingClasses();
                // 每天重置已通知记录
                const now = new Date();
                const msToMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1).getTime() - now.getTime();
                setTimeout(() => { notifiedClasses = new Set();
                    startNotifyCheck(); }, msToMidnight + 1000);
            }

            function checkUpcomingClasses() {
                if (!notifyEnabled || Notification.permission !== 'granted') return;
                const now = new Date();
                const curMin = now.getHours() * 60 + now.getMinutes();
                const today = now.getDay();
                const sToday = today === 0 ? 7 : today;
                const dayCourses = (scheduleData[sToday] || []).map((c, i) => ({ ...c, day: sToday, period: i + 1 }));
                dayCourses.forEach(c => {
                    if (!c.name || notifiedClasses.has(c.id)) return;
                    const [sh, sm] = c.startTime.split(':').map(Number);
                    const startMin = sh * 60 + sm;
                    const diff = startMin - curMin;
                    if (diff >= 4 && diff <= 6) {
                        new Notification(`🔔 即将上课：${c.name}`, {
                            body: `${c.teacher ? '老师：' + c.teacher + '  ' : ''}${c.room ? '教室：' + c.room + '  ' : ''}${c.startTime}-${c.endTime}`,
                            icon: 'apple-touch-icon.png',
                            tag: `class-${c.id}`,
                            renotify: true,
                        });
                        notifiedClasses.add(c.id);
                    }
                });
            }

            // 双击搜索按钮开启通知
            $('#btnSearch').addEventListener('dblclick', requestNotification);

            // ==================== 列表自动滚动 ====================
            function scrollToCurrentInList() {
                if (currentView !== 'list') return;
                const now = new Date();
                const curMin = now.getHours() * 60 + now.getMinutes();
                const today = now.getDay();
                const sToday = today === 0 ? 7 : today;
                const items = listViewCourses.querySelectorAll('.list-course-item');
                if (items.length === 0) return;
                let targetIdx = -1;
                const dayCourses = (scheduleData[sToday] || []).map((c, i) => ({ ...c, day: sToday, period: i + 1 }));
                for (let i = 0; i < dayCourses.length; i++) {
                    const [sh, sm] = dayCourses[i].startTime.split(':').map(Number);
                    const [eh, em] = dayCourses[i].endTime.split(':').map(Number);
                    const start = sh * 60 + sm;
                    const end = eh * 60 + em;
                    if (curMin >= start && curMin <= end) { targetIdx = i; break; }
                }
                if (targetIdx < 0) {
                    for (let i = 0; i < dayCourses.length; i++) {
                        const [sh, sm] = dayCourses[i].startTime.split(':').map(Number);
                        if (sh * 60 + sm > curMin) { targetIdx = i; break; }
                    }
                }
                if (targetIdx >= 0 && items[targetIdx]) {
                    setTimeout(() => {
                        items[targetIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);
                }
            }

            // ==================== Toast ====================
            let toastTimer;

                toast.textContent = msg;
                toast.classList.add('show');
                toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);

            let undoTimer2 = null;

            function showUndoToast(courseName) {
                $('#undoToastMsg').textContent = `已删除「${courseName}」`;
                undoToast.classList.add('show');
                if (undoTimer2) clearTimeout(undoTimer2);
                undoTimer2 = setTimeout(() => undoToast.classList.remove('show'), 3000);

            // ==================== 全局刷新 ====================
            function updateWeekUI() {
                weekLabel.textContent = `第 ${currentWeek} 周`;
            }

            function refreshAll() {
                nextId = getMaxId() + 1;
                updateWeekUI();
                createClassCards();
                if (currentView === 'list') renderListView();
                renderTimetable();
                currentIndex = getCurrentClassIndex();
                updateCards();

            // ==================== 时间更新 ====================
            let lastMinute = -1;

            function updateDateTime() {
                const now = new Date();
                $('#currentDate').textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long',
                    day: 'numeric', weekday: 'long' });
                $('#currentTime').textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit',
                    second: '2-digit' });

                const curMin = now.getMinutes();
                if (curMin !== lastMinute) {
                    lastMinute = curMin;
                    const all = getAllClasses();
                    if (all.length > 0) {
                        const prevIdx = currentIndex;
                        const newIdx = getCurrentClassIndex();
                        if (newIdx !== prevIdx) {
                            currentIndex = newIdx;
                            if (currentView === 'card') updateCards();
                        }
                        updateCurrentClass();
                        updateCardStatus();
                    }
                    if (currentView === 'list') renderListView();
                }
                // 每秒更新状态（只更新状态文字，不重建 DOM）
                if (currentView === 'card') updateCardStatus();
            }

            // ==================== 惯性滑动 ====================
            let swipeState = {
                active: false,
                startX: 0,
                startY: 0,
                lastX: 0,
                lastY: 0,
                lastTime: 0,
                velocity: 0,
                animating: false,
                animFrame: null,
                preventedScroll: false,
            };
            let visualOffset = 0;

            // 重写卡片位置计算，闭环循环 + visualOffset 偏移
            calculateCardPosition = function(index, total) {
                // 计算最短环绕距离（前后各取一半，形成闭环）
                let rawDist = index - currentIndex - visualOffset;
                const half = total / 2;
                if (rawDist > half) rawDist -= total;
                if (rawDist < -half) rawDist += total;
                const dist = Math.abs(rawDist);
                const normDist = Math.min(dist / 3, 1);
                const scale = 1 - normDist * 0.3;
                const w = baseWidth + (maxWidth - baseWidth) * (1 - normDist);
                const h = baseHeight + (maxHeight - baseHeight) * (1 - normDist);
                const z = Math.round(10 - normDist * 8);
                let bg;
                if (dist < 0.5) bg = 'var(--glass-bg-strong)';
                else if (dist < 1.5) bg = 'var(--glass-bg)';
                else bg = 'var(--glass-bg-surface)';
                const xPos = centerX + rawDist * (baseWidth + spacing);
                return { x: xPos, y: window.innerHeight / 2, width: w, height: h, scale, zIndex: z, background: bg,
                    isCenter: dist < 0.5 };
            };

            function handleSwipeStart(x, y) {
                if (currentView !== 'card') return;
                if (swipeState.animating) stopMomentum();
                swipeState.active = true;
                swipeState.startX = x;
                swipeState.startY = y;
                swipeState.lastX = x;
                swipeState.lastY = y;
                swipeState.lastTime = performance.now();
                swipeState.velocity = 0;
                swipeState.preventedScroll = false;
                visualOffset = 0;
                scheduleContainer.style.cursor = 'grabbing';
            }

            function handleSwipeMove(x, y, preventDefaultFn) {
                if (!swipeState.active) return;
                const dx = x - swipeState.startX;
                const dy = y - swipeState.startY;
                // 超过 8px 阈值才开始判定方向，避免误触
                if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
                    if (Math.abs(dx) > Math.abs(dy) && preventDefaultFn && !swipeState.preventedScroll) {
                        preventDefaultFn();
                        swipeState.preventedScroll = true;
                    }
                }
                if (!swipeState.preventedScroll && Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
                if (Math.abs(dx) > Math.abs(dy) || swipeState.preventedScroll) {
                    const cardW = baseWidth + spacing;
                    const now = performance.now();
                    const dt = Math.max(now - swipeState.lastTime, 1);
                    // 瞬时速度（卡片数/毫秒），手指右滑 dx>0，卡片应向右偏移
                    const instantV = (x - swipeState.lastX) / cardW / dt;
                    swipeState.velocity = swipeState.velocity * 0.5 + instantV * 0.5;
                    swipeState.lastX = x;
                    swipeState.lastTime = now;
                    visualOffset = -dx / cardW;
                    updateCards();
                }
            }

            function handleSwipeEnd() {
                if (!swipeState.active) return;
                swipeState.active = false;
                scheduleContainer.style.cursor = 'grab';
                const all = getAllClasses();
                if (all.length === 0) { visualOffset = 0;
                    updateCards(); return; }
                const absV = Math.abs(swipeState.velocity);
                const absOff = Math.abs(visualOffset);
                // 轻滑：速度慢 且 偏移不到半张 → 翻一页或弹回
                if (absV < 0.008 && absOff < 1.2) {
                    gentleSnapToNeighbor();
                } else {
                    // 快滑/大幅：惯性多页滚动
                    startMomentum();
                }
            }

            function gentleSnapToNeighbor() {
                const all = getAllClasses();
                const total = all.length;
                let dir = 0;
                if (visualOffset < -0.15) dir = -1; // 右滑 → 上一张
                else if (visualOffset > 0.15) dir = 1; // 左滑 → 下一张

                const startOff = visualOffset;
                const endOff = dir; // dir 就是目标 visualOffset（-1 / 0 / 1）
                const newIdx = ((currentIndex + dir) % total + total) % total;
                const startTime = performance.now();
                const duration = 260;

                function animateGentle() {
                    const elapsed = performance.now() - startTime;
                    const t = Math.min(elapsed / duration, 1);
                    const ease = 1 - Math.pow(1 - t, 3); // ease-out 曲线
                    visualOffset = startOff + (endOff - startOff) * ease;
                    updateCards();
                    if (t < 1) {
                        requestAnimationFrame(animateGentle);
                    } else {
                        currentIndex = newIdx;
                        visualOffset = 0;
                        updateCards();
                        updateCurrentClass();
                        updateCardStatus();
                    }
                }
                requestAnimationFrame(animateGentle);
            }

            function startMomentum() {
                if (swipeState.animating) cancelAnimationFrame(swipeState.animFrame);
                swipeState.animating = true;
                // 快滑摩擦力更小，飞得更远
                const friction = Math.abs(swipeState.velocity) > 0.015 ? 0.96 : 0.92;

                function animate() {
                    if (!swipeState.animating) return;
                    const absV = Math.abs(swipeState.velocity);
                    if (absV < 0.00015 && Math.abs(visualOffset - Math.round(visualOffset)) < 0.006) {
                        snapToNearest();
                        return;
                    }
                    visualOffset -= swipeState.velocity * 16;
                    swipeState.velocity *= friction;
                    if (absV < 0.0005) {
                        const target = Math.round(visualOffset);
                        visualOffset += (target - visualOffset) * 0.28;
                        if (Math.abs(target - visualOffset) < 0.003) {
                            visualOffset = target;
                            snapToNearest();
                            return;
                        }
                    }
                    updateCards();
                    swipeState.animFrame = requestAnimationFrame(animate);
                }
                swipeState.animFrame = requestAnimationFrame(animate);
            }

            function stopMomentum() {
                swipeState.animating = false;
                if (swipeState.animFrame) cancelAnimationFrame(swipeState.animFrame);
            }

            function snapToNearest() {
                stopMomentum();
                const all = getAllClasses();
                const total = all.length;
                if (total === 0) { visualOffset = 0;
                    updateCards();
                    updateCurrentClass(); return; }
                // 取最短路径：超过半圈走另一边更近
                let voff = visualOffset;
                const half = total / 2;
                if (voff > half) voff -= total;
                if (voff < -half) voff += total;
                const rounded = Math.round(voff);
                let newIdx = ((currentIndex + rounded) % total + total) % total;
                currentIndex = newIdx;
                visualOffset = 0;
                updateCards();
                updateCurrentClass();
                updateCardStatus();
            }

            scheduleContainer.addEventListener('mousedown', e => { e.preventDefault();
                handleSwipeStart(e.clientX, e.clientY); });
            scheduleContainer.addEventListener('mousemove', e => handleSwipeMove(e.clientX, e.clientY));
            scheduleContainer.addEventListener('mouseup', handleSwipeEnd);
            scheduleContainer.addEventListener('mouseleave', handleSwipeEnd);
            scheduleContainer.addEventListener('touchstart', e => { const t = e.touches[0];
                handleSwipeStart(t.clientX, t.clientY); }, { passive: true });
            scheduleContainer.addEventListener('touchmove', e => handleSwipeMove(e.touches[0].clientX, e.touches[0].clientY,
                () => e.preventDefault()), { passive: false });
            scheduleContainer.addEventListener('touchend', handleSwipeEnd);

            // 卡片上的编辑按钮点击
            scheduleContainer.addEventListener('click', e => {
                const editBtnEl = e.target.closest('[data-action="edit"]');
                if (editBtnEl) {
                    e.stopPropagation();
                    const id = parseInt(editBtnEl.getAttribute('data-id'));
                    const all = getAllClasses();
                    const course = all.find(c => c.id === id);
                    if (course) openEditModal(course);
                }
                if (e.target.closest('#emptyAddBtn')) {
                    e.stopPropagation();
                    openEditModal(null);
                }
            });

            // ==================== 事件绑定 ====================
            btnCardView.addEventListener('click', () => switchView('card'));
            btnListView.addEventListener('click', () => switchView('list'));
            btnExport.addEventListener('click', exportAsImage);
            btnExportTable.addEventListener('click', exportAsImage);
            $('#btnPeriodMinus').addEventListener('click', () => changePeriodCount(-1));
            $('#btnPeriodPlus').addEventListener('click', () => changePeriodCount(1));
            $('#btnWeekPrev').addEventListener('click', () => { if (currentWeek > 1) switchWeek(currentWeek - 1); });
            $('#btnWeekNext').addEventListener('click', () => switchWeek(currentWeek + 1));
            $('#btnSearch').addEventListener('click', toggleSearch);

            // ===== watchOS 更多菜单 =====
            const watchMoreBtn = $('#watchMoreBtn');
            const watchMenuOverlay = $('#watchMenuOverlay');

            watchMoreBtn.addEventListener('click', () => {
                watchMenuOverlay.classList.add('show');
            });
            watchMenuOverlay.addEventListener('click', e => {
                if (e.target === watchMenuOverlay) watchMenuOverlay.classList.remove('show');
            });
            $('#watchMenuClose').addEventListener('click', () => {
                watchMenuOverlay.classList.remove('show');
            });
            // 菜单项点击
            watchMenuOverlay.querySelectorAll('.watch-menu-item').forEach(item => {
                item.addEventListener('click', () => {
                    const action = item.getAttribute('data-action');
                    watchMenuOverlay.classList.remove('show');
                    switch (action) {
                        case 'list':
                            switchView('list');
                            break;
                        case 'timetable':
                            renderTimetable();
                            timetableSection.classList.add('active');
                            break;
                        case 'search':
                            toggleSearch();
                            break;
                        case 'add':
                            openEditModal(null);
                            break;
                        case 'today':
                            currentIndex = getCurrentClassIndex();
                            updateCards();
                            updateCurrentClass();
                            updateCardStatus();
                            break;
                        case 'export':
                            exportAsImage();
                            break;
                        case 'theme':
                            btnTheme.click();
                            break;
                        case 'notify':
                            requestNotification();
                            break;
                        case 'prevWeek':
                            if (currentWeek > 1) switchWeek(currentWeek - 1);
                            break;
                        case 'nextWeek':
                            switchWeek(currentWeek + 1);
                            break;
                    }
                });
            });

            todayBtn.addEventListener('click', () => {
                currentIndex = getCurrentClassIndex();
                if (currentView === 'card') updateCards();
                else renderListView();
                updateCurrentClass();
                updateCardStatus();
            });
            editBtn.addEventListener('click', () => {
                renderTimetable();
                timetableSection.classList.add('active');
            });
            closeTimetable.addEventListener('click', () => timetableSection.classList.remove('active'));
            btnAddCourse.addEventListener('click', () => openEditModal(null));
            $('#btnSaveCourse').addEventListener('click', saveCourse);
            $('#btnCancelEdit').addEventListener('click', closeEditModal);
            $('#btnDeleteCourse').addEventListener('click', deleteCourse);
            editModalOverlay.addEventListener('click', e => { if (e.target === editModalOverlay) closeEditModal(); });

            // 主题切换
            const themePopup = $('#themePopup');
            const btnTheme = $('#btnTheme');
            let themePopupVisible = false;

            btnTheme.addEventListener('click', (e) => {
                e.stopPropagation();
                themePopupVisible = !themePopupVisible;
                themePopup.classList.toggle('show', themePopupVisible);
            });

            $$('.theme-dot').forEach(dot => {
                dot.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const theme = this.getAttribute('data-theme');
                    document.body.className = theme === 'default' ? '' : `theme-${theme}`;
                    themePopupVisible = false;
                    themePopup.classList.remove('show');
                });
            });

            // 点击其他地方关闭主题面板
            document.addEventListener('click', () => {
                if (themePopupVisible) {
                    themePopupVisible = false;
                    themePopup.classList.remove('show');
                }
            });

            // 键盘快捷操作
            document.addEventListener('keydown', e => {
                if (editModalOverlay.classList.contains('active')) {
                    if (e.key === 'Escape') closeEditModal();
                    if (e.key === 'Enter' && e.metaKey) saveCourse();
                    return;
                }
                if (timetableSection.classList.contains('active')) {
                    if (e.key === 'Escape') timetableSection.classList.remove('active');
                    return;
                }
                if (e.key === 'ArrowLeft' && currentView === 'card') {
                    currentIndex = (currentIndex - 1 + getAllClasses().length) % getAllClasses().length;
                    updateCards();
                    updateCurrentClass();
                }
                if (e.key === 'ArrowRight' && currentView === 'card') {
                    currentIndex = (currentIndex + 1) % getAllClasses().length;
                    updateCards();
                    updateCurrentClass();
                }
                if (e.key === 't' || e.key === 'T') {
                    renderTimetable();
                    timetableSection.classList.add('active');
                }
                if (e.key === 'l' || e.key === 'L') switchView('list');
                if (e.key === 'c' || e.key === 'C') switchView('card');
                if (e.key === 'n' || e.key === 'N') openEditModal(null);
            });

            window.addEventListener('resize', () => {
                calcCardSizes();
                if (currentView === 'card') updateCards();
                else renderListView();
            });

            // 双击标题重置数据
            $('#currentDate').addEventListener('dblclick', resetToDefault);

            // ==================== 初始化 ====================
            function init() {
                document.body.className = 'theme-dark-blue';
                updateWeekUI();
                updateDateTime();
                setInterval(updateDateTime, 1000);
                createClassCards();
                renderListView();
                currentIndex = getCurrentClassIndex();
                updateCards();
                updateCurrentClass();
                switchView('card');
                // 自动请求通知权限（延迟 3 秒）
                if ('Notification' in window && Notification.permission === 'default') {
                    setTimeout(() => {
                        if (confirm('开启课程提醒通知？课前 5 分钟会提醒你。')) requestNotification();
                    }, 3000);
                } else if ('Notification' in window && Notification.permission === 'granted') {
                    notifyEnabled = true;
                    startNotifyCheck();
                    notifyBadge.classList.add('on');
                }
            }

            init();
            console.log('📋 课表 Pro 已就绪');
            console.log('  📅 多周课表  |  🔍 搜索 (⌘K)  |  🔔 课程提醒');
            console.log('  ⌨️  ← → 切换课程  |  C/L 切换视图  |  T 打开课表  |  N 添加课程');
        })();
    </script>
</body>
</html>
