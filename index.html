<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>课表 Pro</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-color);
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ===== 配色变量 ===== */
        :root {
            --bg-gradient-start: #1a1a1a;
            --bg-gradient-end: #0d0d0d;
            --text-color: #fff;
            --card-bg-gradient-start: #2c2c2e;
            --card-bg-gradient-end: #1c1c1e;
            --card-adjacent-gradient-start: #3a3a3c;
            --card-adjacent-gradient-end: #2a2a2c;
            --card-far-gradient-start: #454547;
            --card-far-gradient-end: #353537;
            --accent-color: #0071e3;
            --accent-color-dark: #0055a4;
            --progress-bar-color: #0071e3;
            --header-bg: rgba(0, 0, 0, 0.5);
            --button-bg: rgba(40, 40, 40, 0.8);
            --button-bg-hover: rgba(60, 60, 60, 0.9);
            --button-border: #3a3a3c;
            --table-header-bg: #1c1c1e;
            --table-border: #333;
            --empty-cell-color: #555;
            --class-details-color: #aaa;
            --class-time-color: #888;
            --modal-bg: #1c1c1e;
            --modal-overlay: rgba(0, 0, 0, 0.7);
            --input-bg: #2c2c2e;
            --input-border: #3a3a3c;
            --danger-color: #ff453a;
            --success-color: #32d74b;
        }

        .theme-dark-blue {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #0c1220;
            --card-bg-gradient-start: #1e293b;
            --card-bg-gradient-end: #0f172a;
            --card-adjacent-gradient-start: #334155;
            --card-adjacent-gradient-end: #1e293b;
            --card-far-gradient-start: #475569;
            --card-far-gradient-end: #334155;
            --accent-color: #3b82f6;
            --accent-color-dark: #2563eb;
            --progress-bar-color: #3b82f6;
            --modal-bg: #0f172a;
            --input-bg: #1e293b;
            --input-border: #334155;
        }
        .theme-purple {
            --bg-gradient-start: #1f1a2a;
            --bg-gradient-end: #181421;
            --card-bg-gradient-start: #2d243f;
            --card-bg-gradient-end: #1f1a2a;
            --card-adjacent-gradient-start: #443563;
            --card-adjacent-gradient-end: #2d243f;
            --card-far-gradient-start: #5a4785;
            --card-far-gradient-end: #443563;
            --accent-color: #8b5cf6;
            --accent-color-dark: #7c3aed;
            --progress-bar-color: #8b5cf6;
            --modal-bg: #1f1a2a;
            --input-bg: #2d243f;
            --input-border: #443563;
        }
        .theme-green {
            --bg-gradient-start: #0f1e1a;
            --bg-gradient-end: #0c1814;
            --card-bg-gradient-start: #16332a;
            --card-bg-gradient-end: #0f1e1a;
            --card-adjacent-gradient-start: #224d3f;
            --card-adjacent-gradient-end: #16332a;
            --card-far-gradient-start: #2e6754;
            --card-far-gradient-end: #224d3f;
            --accent-color: #10b981;
            --accent-color-dark: #059669;
            --progress-bar-color: #10b981;
            --modal-bg: #0f1e1a;
            --input-bg: #16332a;
            --input-border: #224d3f;
        }
        .theme-orange {
            --bg-gradient-start: #2a1a0f;
            --bg-gradient-end: #20140c;
            --card-bg-gradient-start: #3f2a16;
            --card-bg-gradient-end: #2a1a0f;
            --card-adjacent-gradient-start: #634422;
            --card-adjacent-gradient-end: #3f2a16;
            --card-far-gradient-start: #855a2e;
            --card-far-gradient-end: #634422;
            --accent-color: #f97316;
            --accent-color-dark: #ea580c;
            --progress-bar-color: #f97316;
            --modal-bg: #2a1a0f;
            --input-bg: #3f2a16;
            --input-border: #634422;
        }

        /* ===== 主布局 ===== */
        .container {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            position: relative;
            overflow: hidden;
        }

        /* ===== 顶部栏 ===== */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            flex-wrap: wrap;
            gap: 8px;
        }
        .date {
            font-size: 18px;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .time {
            font-size: 18px;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .header-current {
            background: rgba(0, 113, 227, 0.85);
            padding: 6px 14px;
            border-radius: 18px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 1;
            min-width: 0;
        }
        .header-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--button-bg);
            border: 1px solid var(--button-border);
            color: var(--text-color);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .header-btn:hover {
            background: var(--button-bg-hover);
            transform: scale(1.08);
        }
        .header-btn.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        /* ===== 主内容区 ===== */
        .main-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* ===== 卡片视图 ===== */
        .schedule-container {
            display: flex;
            align-items: center;
            height: 100%;
            position: relative;
            width: 100%;
            cursor: grab;
        }
        .schedule-container:active {
            cursor: grabbing;
        }
        .schedule-card {
            position: absolute;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            padding: 15px;
        }
        .schedule-card .card-day {
            position: absolute;
            top: 16px;
            left: 18px;
            font-size: 13px;
            opacity: 0.8;
        }
        .schedule-card .card-status {
            position: absolute;
            top: 14px;
            right: 14px;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 8px;
            font-weight: 500;
            white-space: nowrap;
        }
        .schedule-card .card-status.status-upcoming {
            background: rgba(100, 180, 255, 0.2);
            color: #64b4ff;
            border: 1px solid rgba(100, 180, 255, 0.3);
        }
        .schedule-card .card-status.status-ongoing {
            background: rgba(50, 215, 75, 0.2);
            color: #32d74b;
            border: 1px solid rgba(50, 215, 75, 0.3);
        }
        .schedule-card .card-status.status-finished {
            background: rgba(150, 150, 150, 0.2);
            color: #969696;
            border: 1px solid rgba(150, 150, 150, 0.3);
        }
        .schedule-card .card-name {
            font-size: inherit;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .schedule-card .card-teacher {
            font-size: 0.65em;
            color: var(--class-details-color);
        }
        .schedule-card .card-room {
            font-size: 0.58em;
            color: var(--class-time-color);
            margin-top: 2px;
        }
        .schedule-card .card-time {
            position: absolute;
            bottom: 16px;
            right: 18px;
            font-size: 0.55em;
            opacity: 0.7;
        }
        .schedule-card .card-edit-btn {
            position: absolute;
            bottom: 14px;
            left: 18px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-color);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 5;
        }
        .schedule-card:hover .card-edit-btn,
        .schedule-card .card-edit-btn.always-show {
            opacity: 0.9;
        }

        /* ===== 列表视图 ===== */
        .list-view-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 80px 16px 140px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .list-view-container.hidden {
            display: none;
        }
        .schedule-container.hidden {
            display: none;
        }
        .list-header {
            text-align: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .list-header h2 {
            font-size: 22px;
            font-weight: 600;
        }
        .list-header .list-date {
            font-size: 14px;
            color: var(--class-details-color);
            margin-top: 4px;
        }
        .list-empty {
            text-align: center;
            color: var(--empty-cell-color);
            font-size: 18px;
            padding: 40px 20px;
        }
        .list-empty i {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
            opacity: 0.4;
        }
        .list-course-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 18px;
            margin-bottom: 10px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--card-bg-gradient-start) 0%, var(--card-bg-gradient-end) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .list-course-item:active {
            transform: scale(0.98);
            background: var(--card-adjacent-gradient-start);
        }
        .list-course-item .period-badge {
            min-width: 52px;
            height: 52px;
            border-radius: 14px;
            background: var(--accent-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            line-height: 1.1;
        }
        .list-course-item .period-badge small {
            font-size: 9px;
            font-weight: 400;
            opacity: 0.8;
        }
        .list-course-item .course-body {
            flex: 1;
            min-width: 0;
        }
        .list-course-item .course-body .course-name {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 3px;
        }
        .list-course-item .course-body .course-meta {
            font-size: 13px;
            color: var(--class-details-color);
        }
        .list-course-item .course-time {
            font-size: 12px;
            color: var(--class-time-color);
            white-space: nowrap;
        }
        .list-course-item .course-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .list-course-item .course-status-dot.ongoing {
            background: #32d74b;
            box-shadow: 0 0 8px rgba(50, 215, 75, 0.5);
        }
        .list-course-item .course-status-dot.upcoming {
            background: #64b4ff;
            box-shadow: 0 0 8px rgba(100, 180, 255, 0.3);
        }
        .list-course-item .course-status-dot.finished {
            background: #555;
        }

        /* ===== 进度条 ===== */
        .week-progress {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 500px;
            height: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            z-index: 10;
        }
        .progress-bar {
            height: 100%;
            background: var(--progress-bar-color);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* ===== 底部按钮 ===== */
        .bottom-buttons {
            position: absolute;
            bottom: 24px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            z-index: 10;
            padding: 0 16px;
        }
        .today-btn {
            padding: 13px 24px;
            border-radius: 30px;
            background: var(--button-bg);
            border: 1px solid var(--button-border);
            color: var(--text-color);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .today-btn:hover {
            background: var(--button-bg-hover);
            transform: scale(1.03);
        }
        .bottom-icon-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--button-bg);
            border: 1px solid var(--button-border);
            color: var(--text-color);
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }
        .bottom-icon-btn:hover {
            background: var(--button-bg-hover);
            transform: scale(1.05);
        }
        .bottom-icon-btn.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        /* ===== 主题弹出面板 ===== */
        .theme-popup {
            position: absolute;
            bottom: 100px;
            right: 16px;
            z-index: 25;
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            background: var(--button-bg);
            border: 1px solid var(--button-border);
            border-radius: 28px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
            transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .theme-popup.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
        .theme-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.25);
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .theme-dot:hover {
            transform: scale(1.18);
            border-color: #fff;
        }
        .theme-dot.dot-default {
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
        }
        .theme-dot.dot-blue {
            background: linear-gradient(135deg, #0f172a 0%, #0c1220 100%);
        }
        .theme-dot.dot-purple {
            background: linear-gradient(135deg, #1f1a2a 0%, #181421 100%);
        }
        .theme-dot.dot-green {
            background: linear-gradient(135deg, #0f1e1a 0%, #0c1814 100%);
        }
        .theme-dot.dot-orange {
            background: linear-gradient(135deg, #2a1a0f 0%, #20140c 100%);
        }

        /* ===== 完整课表面板 ===== */
        .timetable-section {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: var(--bg-gradient-start);
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 16px;
            transform: translateY(100%);
            transition: transform 0.45s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .timetable-section.active {
            transform: translateY(0);
        }
        .timetable-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--table-border);
            flex-shrink: 0;
        }
        .timetable-header h2 {
            font-size: 22px;
            font-weight: 600;
        }
        .timetable-header .timetable-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .close-timetable {
            background: none;
            border: none;
            font-size: 28px;
            color: var(--class-details-color);
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        .close-timetable:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
        }
        .timetable-container {
            flex: 1;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }
        .timetable {
            width: 100%;
            border-collapse: collapse;
            min-width: 650px;
        }
        .timetable th {
            background: var(--table-header-bg);
            padding: 12px 6px;
            text-align: center;
            font-weight: 600;
            color: var(--text-color);
            font-size: 14px;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .timetable td {
            padding: 10px 6px;
            text-align: center;
            border-bottom: 1px solid var(--table-border);
            min-height: 70px;
            vertical-align: top;
            cursor: pointer;
            transition: background 0.15s ease;
            position: relative;
        }
        .timetable td:hover {
            background: rgba(255, 255, 255, 0.04);
        }
        .timetable td.empty-cell {
            color: var(--empty-cell-color);
            cursor: pointer;
        }
        .timetable td.empty-cell:hover {
            color: var(--text-color);
        }
        .timetable td.empty-cell::after {
            content: '+';
            display: block;
            font-size: 20px;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .timetable td.empty-cell:hover::after {
            opacity: 0.4;
        }
        .timetable .period-col {
            font-weight: 600;
            color: var(--class-details-color);
            width: 55px;
            cursor: default;
            font-size: 13px;
        }
        .timetable .period-col:hover {
            background: transparent;
        }
        .timetable .class-info {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .timetable .class-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 3px;
        }
        .timetable .class-details {
            font-size: 11px;
            color: var(--class-details-color);
        }
        .timetable .class-time {
            font-size: 10px;
            color: var(--class-time-color);
            margin-top: 2px;
        }

        /* ===== 编辑弹窗 ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: var(--modal-overlay);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-sheet {
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            max-height: 85dvh;
            background: var(--modal-bg);
            border-radius: 22px 22px 0 0;
            padding: 20px 20px 30px;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .modal-overlay.active .modal-sheet {
            transform: translateY(0);
        }
        .modal-sheet h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 18px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--class-details-color);
            margin-bottom: 5px;
        }
        .form-row {
            display: flex;
            gap: 10px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 11px 14px;
            border-radius: 12px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s ease;
            -webkit-appearance: none;
            appearance: none;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--accent-color);
        }
        .form-group select {

            let centerX = window.innerWidth / 2;
            let baseWidth, maxWidth, baseHeight, maxHeight, spacing;

            function calcCardSizes() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                centerX = w / 2;
                if (w <= 420) {
                    baseWidth = 170;
                    maxWidth = 250;
                    spacing = -32;
                } else if (w <= 768) {
                    baseWidth = 220;
                    maxWidth = 340;
                    spacing = -40;
                } else {
                    baseWidth = 310;
                    maxWidth = 480;
                    spacing = -52;
                }
                // 4:3 比例：高度 = 宽度 × 0.75，且不超过屏幕高度的 60%
                const maxAllowedH = h * 0.60;
                const idealMaxH = maxWidth * 0.75;
                if (idealMaxH > maxAllowedH) {
                    maxHeight = Math.floor(maxAllowedH);
                    maxWidth = Math.floor(maxHeight / 0.75);
                    baseWidth = Math.floor(maxWidth * 0.65);
                } else {
                    maxHeight = Math.floor(idealMaxH);
                }
                baseHeight = Math.floor(baseWidth * 0.75);
            }
            calcCardSizes();

            function getAllClasses() {
                const all = [];
                for (let day = 1; day <= 7; day++) {
                    (scheduleData[day] || []).forEach((course, idx) => {
                        all.push({ ...course, day, period: idx + 1 });
                    });
                }
                return all;
            }

            function calculateCardPosition(index, total) {
                let adj = index;
                if (adj < 0) adj = total + (adj % total);
                else if (adj >= total) adj = adj % total;
                const xPos = centerX + (adj - currentIndex) * (baseWidth + spacing);
                const dist = Math.abs(adj - currentIndex);
                const normDist = Math.min(dist / 3, 1);
                const scale = 1 - normDist * 0.3;
                const w = baseWidth + (maxWidth - baseWidth) * (1 - normDist);
                const h = baseHeight + (maxHeight - baseHeight) * (1 - normDist);
                const z = Math.round(10 - normDist * 8);
                let bg;
                if (dist === 0) bg = 'var(--card-bg-gradient-start)';
                else if (dist === 1) bg = 'var(--card-adjacent-gradient-start)';
                else bg = 'var(--card-far-gradient-start)';
                return { x: xPos, y: window.innerHeight / 2, width: w, height: h, scale, zIndex: z, background: bg,
                    isCenter: dist === 0 };
            }

            function createClassCards() {
                scheduleContainer.innerHTML = '';
                const all = getAllClasses();
                if (all.length === 0) {
                    scheduleContainer.innerHTML =
                        '<div style="text-align:center;color:#888;width:100%;padding-top:40vh;"><i class="fas fa-calendar-plus" style="font-size:48px;display:block;margin-bottom:12px;"></i>还没有课程，点击 + 添加</div>';
                    return;
                }
                all.forEach((c, i) => {
                    const card = document.createElement('div');
                    card.className = 'schedule-card';
                    card.setAttribute('data-index', i);
                    card.setAttribute('data-id', c.id);
                    card.innerHTML = `
                        <div class="card-day">${dayNames[c.day]} ${periodNames[c.period]}</div>
                        <div class="card-status" id="status-${i}">状态</div>
                        <div class="card-name">${c.name}</div>
                        <div class="card-teacher">${c.teacher || ''}</div>
                        <div class="card-room">${c.room ? '📍 ' + c.room : ''}</div>
                        <div class="card-time">${c.startTime} - ${c.endTime}</div>
                        <button class="card-edit-btn always-show" data-action="edit" data-id="${c.id}" title="编辑此课程">
                            <i class="fas fa-pen"></i>
                        </button>
                    `;
                    scheduleContainer.appendChild(card);
                });
                updateCards();
                updateCardStatus();
            }

            function updateCards() {
                const all = getAllClasses();
                const total = all.length;
                const cards = $$('.schedule-card');
                if (total === 0) return;
                cards.forEach(card => {
                    const idx = parseInt(card.getAttribute('data-index'));
                    const pos = calculateCardPosition(idx, total);
                    card.style.left = `${pos.x - pos.width / 2}px`;
                    card.style.top = `${pos.y - pos.height / 2}px`;
                    card.style.width = `${pos.width}px`;
                    card.style.height = `${pos.height}px`;
                    card.style.transform = `scale(${pos.scale})`;
                    card.style.zIndex = pos.zIndex;
                    card.style.background = `linear-gradient(135deg, ${pos.background} 0%, var(--card-bg-gradient-end) 100%)`;
                    const fontSize = 22 + (34 - 22) * (1 - Math.abs(idx - currentIndex) / 3);
                    card.style.fontSize = `${fontSize}px`;
                    card.style.fontWeight = idx === currentIndex ? '700' : '600';
                });
                const progress = total > 0 ? ((currentIndex % total) / total) * 100 : 0;
                progressBar.style.width = `${progress}%`;
                updateCardStatus();
            }

            function updateCardStatus() {
                const all = getAllClasses();
                const now = new Date();
                const curMin = now.getHours() * 60 + now.getMinutes();
                const today = now.getDay();
                const sToday = today === 0 ? 7 : today;
                all.forEach((c, i) => {
                    const el = document.getElementById(`status-${i}`);
                    if (!el) return;
                    el.classList.remove('status-upcoming', 'status-ongoing', 'status-finished');
                    const [sh, sm] = c.startTime.split(':').map(Number);
                    const [eh, em] = c.endTime.split(':').map(Number);
                    const start = sh * 60 + sm;
                    const end = eh * 60 + em;
                    let txt, cls;
                    if (c.day < sToday || (c.day === sToday && end < curMin)) {
                        txt = '已下课';
                        cls = 'status-finished';
                    } else if (c.day > sToday || (c.day === sToday && start > curMin)) {
                        txt = '未上课';
                        cls = 'status-upcoming';
                    } else if (c.day === sToday && curMin >= start && curMin <= end) {
                        txt = '上课中';
                        cls = 'status-ongoing';
                    } else {
                        txt = '未上课';
                        cls = 'status-upcoming';
                    }
                    el.textContent = txt;
                    el.classList.add(cls);
                });
            }

            function getCurrentClassIndex() {
                const now = new Date();
                const curMin = now.getHours() * 60 + now.getMinutes();
                const today = now.getDay();
                const sToday = today === 0 ? 7 : today;
                const all = getAllClasses();
                if (all.length === 0) return 0;

                // 找正在进行的课
                for (let i = 0; i < all.length; i++) {
                    if (all[i].day === sToday) {
                        const [sh, sm] = all[i].startTime.split(':').map(Number);
                        const [eh, em] = all[i].endTime.split(':').map(Number);
                        if (curMin >= sh * 60 + sm && curMin <= eh * 60 + em) return i;
                    }
                }
                // 找最近的下一节课（今天）
                let best = -1;
                let minDiff = Infinity;
                for (let i = 0; i < all.length; i++) {
                    if (all[i].day === sToday) {
                        const [sh, sm] = all[i].startTime.split(':').map(Number);
                        const diff = sh * 60 + sm - curMin;
                        if (diff > 0 && diff < minDiff) { minDiff = diff;
                            best = i; }
                    }
                }
                if (best >= 0) return best;
                // 找未来的天
                for (let d = sToday + 1; d <= 7; d++) {
                    for (let i = 0; i < all.length; i++) {
                        if (all[i].day === d && all[i].period === 1) return i;
                    }
                }
                // 兜底：下周周一第一节
                for (let i = 0; i < all.length; i++) {
                    if (all[i].day === 1 && all[i].period === 1) return i;
                }
                return 0;
            }

            function updateCurrentClass() {
                const all = getAllClasses();
                if (all.length > 0 && all[currentIndex]) {
                    const c = all[currentIndex];
                    currentIndicator.textContent =
                        `当前课程：${c.name}（${dayNames[c.day]} ${periodNames[c.period]}）`;
                } else {
                    currentIndicator.textContent = '当前无课程';
                }
            }

            // ==================== 列表视图 ====================
            function renderListView() {
                const now = new Date();
                const today = now.getDay();
                const sToday = today === 0 ? 7 : today;
                const curMin = now.getHours() * 60 + now.getMinutes();
                const dayCourses = (scheduleData[sToday] || []).map((c, i) => ({ ...c, day: sToday, period: i + 1 }));

                listViewTitle.textContent = `今日课程 · ${dayNames[sToday]}`;
                listViewDate.textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric',
                    weekday: 'long' });

                listViewCourses.innerHTML = '';

                if (dayCourses.length === 0) {
                    listEmpty.classList.remove('hidden');
                    return;
                }
                listEmpty.classList.add('hidden');

                dayCourses.forEach(c => {
                    const [sh, sm] = c.startTime.split(':').map(Number);
                    const [eh, em] = c.endTime.split(':').map(Number);
                    const start = sh * 60 + sm;
                    const end = eh * 60 + em;
                    let statusCls, statusLabel;
                    if (curMin >= start && curMin <= end) { statusCls = 'ongoing';
                        statusLabel = '进行中'; } else if (curMin > end) { statusCls = 'finished';
                        statusLabel = '已结束'; } else { statusCls = 'upcoming';
                        statusLabel = '即将'; }

                    const item = document.createElement('div');
                    item.className = 'list-course-item';
                    item.setAttribute('data-id', c.id);
                    item.innerHTML = `
                        <div class="period-badge">${c.period}<small>节</small></div>
                        <div class="course-body">
                            <div class="course-name">${c.name}</div>
                            <div class="course-meta">${c.teacher || ''}${c.teacher && c.room ? ' · ' : ''}${c.room ? '📍' + c.room : ''}</div>
                        </div>
                        <div class="course-time">${c.startTime}<br>${c.endTime}</div>
                        <div class="course-status-dot ${statusCls}" title="${statusLabel}"></div>
                    `;
                    item.addEventListener('click', () => openEditModal(c));
                    listViewCourses.appendChild(item);
                });
            }

            // ==================== 视图切换 ====================
            function switchView(mode) {
                currentView = mode;
                btnCardView.classList.toggle('active', mode === 'card');
                btnListView.classList.toggle('active', mode === 'list');
                if (mode === 'card') {
                    scheduleContainer.classList.remove('hidden');
                    listViewContainer.classList.add('hidden');
                    updateCards();
                } else {
                    scheduleContainer.classList.add('hidden');
                    listViewContainer.classList.remove('hidden');
                    renderListView();
                }
            }

            // ==================== 编辑弹窗 ====================
            function openEditModal(courseData) {
                editingClassId = courseData ? courseData.id : null;
                $('#modalTitle').textContent = courseData ? '编辑课程' : '添加课程';
                $('#editDay').value = courseData ? courseData.day : (new Date().getDay() || 7);
                $('#editPeriod').value = courseData ? courseData.period : 1;
                $('#editName').value = courseData ? courseData.name : '';
                $('#editTeacher').value = courseData ? (courseData.teacher || '') : '';
                $('#editRoom').value = courseData ? (courseData.room || '') : '';
                $('#editStartTime').value = courseData ? courseData.startTime : '08:00';
                $('#editEndTime').value = courseData ? courseData.endTime : '08:45';
                $('#editId').value = courseData ? courseData.id : '';
                $('#btnDeleteCourse').style.display = courseData ? 'block' : 'none';
                editModalOverlay.classList.add('active');
                setTimeout(() => $('#editName').focus(), 350);
            }

            function closeEditModal() {
                editModalOverlay.classList.remove('active');
                editingClassId = null;
            }

            function saveCourse() {
                const day = parseInt($('#editDay').value);
                const period = parseInt($('#editPeriod').value);
                const name = $('#editName').value.trim();
                const teacher = $('#editTeacher').value.trim();
                const room = $('#editRoom').value.trim();
                const startTime = $('#editStartTime').value;
                const endTime = $('#editEndTime').value;
                const editId = $('#editId').value;

                if (!name) { showToast('⚠️ 请输入课程名称');
                    $('#editName').focus(); return; }
                if (startTime >= endTime) { showToast('⚠️ 结束时间必须晚于开始时间'); return; }

                // 检查同一时间段是否已有课程
                const existing = (scheduleData[day] || [])[period - 1];
                if (existing && String(existing.id) !== String(editId)) {
                    if (!confirm(`该时段已有「${existing.name}」，要替换吗？`)) return;
                }

                // 确保数组长度足够
                while ((scheduleData[day] || []).length < period) {
                    if (!scheduleData[day]) scheduleData[day] = [];
                    scheduleData[day].push(null);
                }

                const courseObj = {
                    id: editId ? parseInt(editId) : nextId++,
                    name,
                    teacher,
                    room,
                    startTime,
                    endTime,
                };

                scheduleData[day][period - 1] = courseObj;
                saveScheduleData();
                closeEditModal();
                refreshAll();
                showToast(editId ? '✅ 课程已更新' : '✅ 课程已添加');
            }

            function deleteCourse() {
                const editId = $('#editId').value;
                if (!editId) return;
                if (!confirm('确定要删除这门课程吗？此操作不可恢复。')) return;

                for (let d = 1; d <= 7; d++) {
                    const arr = scheduleData[d] || [];
                    const idx = arr.findIndex(c => c && String(c.id) === String(editId));
                    if (idx >= 0) {
                        arr.splice(idx, 1);
                        break;
                    }
                }
                // 清理末尾 null
                for (let d = 1; d <= 7; d++) {
                    if (scheduleData[d]) {
                        while (scheduleData[d].length > 0 && scheduleData[d][scheduleData[d].length - 1] === null) {
                            scheduleData[d].pop();
                        }
                    }
                }
                saveScheduleData();
                closeEditModal();
                refreshAll();
                showToast('🗑️ 课程已删除');
            }

            // ==================== 完整课表 ====================
            function renderTimetable() {
                timetableBody.innerHTML = '';
                for (let p = 0; p < 9; p++) {
                    const row = document.createElement('tr');
                    const periodCell = document.createElement('td');
                    periodCell.className = 'period-col';
                    periodCell.textContent = periodNames[p + 1];
                    row.appendChild(periodCell);
                    for (let d = 1; d <= 7; d++) {
                        const cell = document.createElement('td');
                        const course = (scheduleData[d] || [])[p] || null;
                        if (course) {
                            cell.innerHTML = `
                                <div class="class-info">
                                    <div class="class-name">${course.name}</div>
                                    <div class="class-details">${course.teacher || ''}${course.teacher && course.room ? ' · ' : ''}${course.room || ''}</div>
                                    <div class="class-time">${course.startTime}-${course.endTime}</div>
                                </div>
                            `;
                            cell.addEventListener('click', () => openEditModal({ ...course, day: d, period: p +
                                1 }));
                        } else {
                            cell.className = 'empty-cell';
                            cell.innerHTML = '<div class="class-info">-</div>';
                            cell.addEventListener('click', () => openEditModal({ day: d, period: p + 1,
                                startTime: '08:00', endTime: '08:45', name: '', teacher: '', room: '' }));
                        }
                        row.appendChild(cell);
                    }
                    timetableBody.appendChild(row);
                }
            }

            // ==================== 导出图片 ====================
            function exportAsImage() {
                if (typeof html2canvas === 'undefined') {
                    showToast('⚠️ 导出库加载中，请稍后再试');
                    return;
                }
                showToast('📸 正在生成图片...');
                // 临时显示课表面板来截图
                const wasActive = timetableSection.classList.contains('active');
                timetableSection.classList.add('active');
                const captureEl = $('#timetableCapture');

                setTimeout(() => {
                    html2canvas(captureEl, {
                        backgroundColor: getComputedStyle(document.body).getPropertyValue(
                            '--bg-gradient-start').trim() || '#0f172a',
                        scale: 2,
                        useCORS: true,
                    }).then(canvas => {
                        if (!wasActive) timetableSection.classList.remove('active');
                        const link = document.createElement('a');
                        const now = new Date();
                        link.download =
                            `课表_${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        showToast('✅ 课表图片已下载');
                    }).catch(err => {
                        if (!wasActive) timetableSection.classList.remove('active');
                        console.error('导出失败', err);
                        showToast('❌ 导出失败，请重试');
                    });
                }, 300);
            }

            // ==================== Toast ====================
            let toastTimer;

            function showToast(msg) {
                clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.classList.add('show');
                toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
            }

            // ==================== 全局刷新 ====================
            function refreshAll() {
                nextId = getMaxId() + 1;
                createClassCards();
                if (currentView === 'list') renderListView();
                renderTimetable();
                currentIndex = getCurrentClassIndex();
                updateCards();
                updateCurrentClass();
                updateCardStatus();
            }

            // ==================== 时间更新 ====================
            let lastMinute = -1;

            function updateDateTime() {
                const now = new Date();
                $('#currentDate').textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long',
                    day: 'numeric', weekday: 'long' });
                $('#currentTime').textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit',
                    second: '2-digit' });

                const curMin = now.getMinutes();
                if (curMin !== lastMinute) {
                    lastMinute = curMin;
                    const all = getAllClasses();
                    if (all.length > 0) {
                        const prevIdx = currentIndex;
                        const newIdx = getCurrentClassIndex();
                        if (newIdx !== prevIdx) {
                            currentIndex = newIdx;
                            if (currentView === 'card') updateCards();
                        }
                        updateCurrentClass();
                        updateCardStatus();
                    }
                    if (currentView === 'list') renderListView();
                }
                // 每秒更新状态（只更新状态文字，不重建 DOM）
                if (currentView === 'card') updateCardStatus();
            }

            // ==================== 滑动交互 ====================
            let startX, startY, isSwiping, startIdx;

            function handleSwipeStart(x, y) {
                if (currentView !== 'card') return;
                startX = x;
                startY = y;
                isSwiping = true;
                startIdx = currentIndex;
                scheduleContainer.style.cursor = 'grabbing';
            }

            function handleSwipeMove(x, y, preventDefaultFn) {
                if (!isSwiping) return;
                const dx = x - startX;
                const dy = y - startY;
                if (Math.abs(dx) > Math.abs(dy) && preventDefaultFn) {
                    preventDefaultFn();
                }
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) {
                    const cardW = baseWidth + spacing;
                    const moves = Math.round(dx / cardW);
                    let newIdx = startIdx - moves;
                    const all = getAllClasses();
                    const total = all.length;
                    if (total > 0) {
                        if (newIdx < 0) newIdx = total + (newIdx % total);
                        else if (newIdx >= total) newIdx = newIdx % total;
                        if (newIdx !== currentIndex) {
                            currentIndex = newIdx;
                            updateCards();
                            updateCurrentClass();
                        }
                    }
                }
            }

            function handleSwipeEnd() {
                isSwiping = false;
                scheduleContainer.style.cursor = 'grab';
            }

            scheduleContainer.addEventListener('mousedown', e => { e.preventDefault();
                handleSwipeStart(e.clientX, e.clientY); });
            scheduleContainer.addEventListener('mousemove', e => handleSwipeMove(e.clientX, e.clientY));
            scheduleContainer.addEventListener('mouseup', handleSwipeEnd);
            scheduleContainer.addEventListener('mouseleave', handleSwipeEnd);
            scheduleContainer.addEventListener('touchstart', e => handleSwipeStart(e.touches[0].clientX, e.touches[0]
                .clientY), { passive: true });
            scheduleContainer.addEventListener('touchmove', e => handleSwipeMove(e.touches[0].clientX, e.touches[0].clientY,
                () => e.preventDefault()), { passive: false });
            scheduleContainer.addEventListener('touchend', handleSwipeEnd);

            // 卡片上的编辑按钮点击
            scheduleContainer.addEventListener('click', e => {
                const editBtnEl = e.target.closest('[data-action="edit"]');
                if (editBtnEl) {
                    e.stopPropagation();
                    const id = parseInt(editBtnEl.getAttribute('data-id'));
                    const all = getAllClasses();
                    const course = all.find(c => c.id === id);
                    if (course) openEditModal(course);
                }
            });

            // ==================== 事件绑定 ====================
            btnCardView.addEventListener('click', () => switchView('card'));
            btnListView.addEventListener('click', () => switchView('list'));
            btnExport.addEventListener('click', exportAsImage);
            btnExportTable.addEventListener('click', exportAsImage);
            todayBtn.addEventListener('click', () => {
                currentIndex = getCurrentClassIndex();
                if (currentView === 'card') updateCards();
                else renderListView();
                updateCurrentClass();
                updateCardStatus();
            });
            editBtn.addEventListener('click', () => {
                renderTimetable();
                timetableSection.classList.add('active');
            });
            closeTimetable.addEventListener('click', () => timetableSection.classList.remove('active'));
            btnAddCourse.addEventListener('click', () => openEditModal(null));
            $('#btnSaveCourse').addEventListener('click', saveCourse);
            $('#btnCancelEdit').addEventListener('click', closeEditModal);
            $('#btnDeleteCourse').addEventListener('click', deleteCourse);
            editModalOverlay.addEventListener('click', e => { if (e.target === editModalOverlay) closeEditModal(); });

            // 主题切换
            const themePopup = $('#themePopup');
            const btnTheme = $('#btnTheme');
            let themePopupVisible = false;

            btnTheme.addEventListener('click', (e) => {
                e.stopPropagation();
                themePopupVisible = !themePopupVisible;
                themePopup.classList.toggle('show', themePopupVisible);
            });

            $$('.theme-dot').forEach(dot => {
                dot.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const theme = this.getAttribute('data-theme');
                    document.body.className = theme === 'default' ? '' : `theme-${theme}`;
                    themePopupVisible = false;
                    themePopup.classList.remove('show');
                });
            });

            // 点击其他地方关闭主题面板
            document.addEventListener('click', () => {
                if (themePopupVisible) {
                    themePopupVisible = false;
                    themePopup.classList.remove('show');
                }
            });

            // 键盘快捷操作
            document.addEventListener('keydown', e => {
                if (editModalOverlay.classList.contains('active')) {
                    if (e.key === 'Escape') closeEditModal();
                    if (e.key === 'Enter' && e.metaKey) saveCourse();
                    return;
                }
                if (timetableSection.classList.contains('active')) {
                    if (e.key === 'Escape') timetableSection.classList.remove('active');
                    return;
                }
                if (e.key === 'ArrowLeft' && currentView === 'card') {
                    currentIndex = (currentIndex - 1 + getAllClasses().length) % getAllClasses().length;
                    updateCards();
                    updateCurrentClass();
                }
                if (e.key === 'ArrowRight' && currentView === 'card') {
                    currentIndex = (currentIndex + 1) % getAllClasses().length;
                    updateCards();
                    updateCurrentClass();
                }
                if (e.key === 't' || e.key === 'T') {
                    renderTimetable();
                    timetableSection.classList.add('active');
                }
                if (e.key === 'l' || e.key === 'L') switchView('list');
                if (e.key === 'c' || e.key === 'C') switchView('card');
                if (e.key === 'n' || e.key === 'N') openEditModal(null);
            });

            window.addEventListener('resize', () => {
                calcCardSizes();
                if (currentView === 'card') updateCards();
                else renderListView();
            });

            // 双击标题重置数据
            $('#currentDate').addEventListener('dblclick', resetToDefault);

            // ==================== 初始化 ====================
            function init() {
                document.body.className = 'theme-dark-blue';
                updateDateTime();
                setInterval(updateDateTime, 1000);
                createClassCards();
                renderListView(); // 预热列表视图
                currentIndex = getCurrentClassIndex();
                updateCards();
                updateCurrentClass();
